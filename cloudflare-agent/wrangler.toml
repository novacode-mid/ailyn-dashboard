name = "ailyn-agent"
main = "src/index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

# ── Workers AI ─────────────────────────────────────────────────────────────
[ai]
binding = "AI"

# ── D1 Database ────────────────────────────────────────────────────────────
[[d1_databases]]
binding = "DB"
database_name = "ailyn-agent-db"
database_id = "882169e3-eb51-4f00-9689-8f47a3e2948c"
migrations_dir = "migrations"

# ── KV Namespace ───────────────────────────────────────────────────────────
[[kv_namespaces]]
binding = "KV"
id = "c3a239084c1f4b8f9d8599b167b294f8"
preview_id = "c3a239084c1f4b8f9d8599b167b294f8"

# ── Cron Triggers ──────────────────────────────────────────────────────────
[triggers]
crons = ["*/15 * * * *", "0 14 * * *"]

# ── Vectorize (Knowledge Base RAG) ─────────────────────────────────────────
[[vectorize]]
binding = "KNOWLEDGE_BASE"
index_name = "knowledge-base"

# ── Durable Objects (Desktop Tunnel WebSocket) ────────────────────────────
[durable_objects]
bindings = [
  { name = "DESKTOP_TUNNEL", class_name = "DesktopTunnel" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["DesktopTunnel"]

# ── Secrets (set via: wrangler secret put SECRET_NAME) ─────────────────────
# TELEGRAM_BOT_TOKEN    → wrangler secret put TELEGRAM_BOT_TOKEN
# TELEGRAM_SECRET_TOKEN → wrangler secret put TELEGRAM_SECRET_TOKEN
# TELEGRAM_CHAT_ID      → wrangler secret put TELEGRAM_CHAT_ID
# SMARTPASSES_API_KEY   → wrangler secret put SMARTPASSES_API_KEY
